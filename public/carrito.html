<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/bubble_icon.png" />
  <title>Carrito · AutoLavado Express</title>
  <script>
    try {
      const t = localStorage.getItem('tema');
      if (t) document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <header class="app-header" id="app-header"></header>

  <main>
    <div class="page">
      <header class="page-head">
        <h1 class="page-head__title">Tu carrito</h1>
        <p class="page-head__subtitle">Revisá tus productos y finalizá tu pedido.</p>
      </header>

      <div id="cart-layout"></div>
    </div>
  </main>

  <script type="module" src="js/carritoPagina.js"></script>
</body>
</html>

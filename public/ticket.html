<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket · AutoLavado Express</title>
  <script>
    try {
      const t = localStorage.getItem('tema');
      if (t) document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <header class="app-header" id="app-header"></header>

  <main>
    <div class="ticket-wrap">
      <div class="ticket-success">
        <span class="material-symbols-outlined ticket-success__icon">check_circle</span>
        <h1 class="ticket-success__title">¡Compra exitosa!</h1>
        <p class="ticket-success__subtitle">Tu auto te lo va a agradecer. Acá tenés tu comprobante.</p>
      </div>

      <div class="ticket" id="ticket"></div>

      <div class="ticket-actions">
        <button class="btn-primary" id="boton-pdf" type="button">
          <span class="material-symbols-outlined">download</span> Descargar PDF
        </button>
        <button class="btn-ghost" id="boton-finalizar" type="button">
          Finalizar <span class="material-symbols-outlined">arrow_forward</span>
        </button>
      </div>
    </div>
  </main>

  <!-- jsPDF por CDN para el ticket en PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module" src="js/ticket.js"></script>
</body>
</html>

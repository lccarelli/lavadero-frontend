<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/bubble_icon.png" />
  <title>Productos · AutoLavado Express</title>
  <script>
    try {
      const t = localStorage.getItem('tema');
      if (t) document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
  </script>
  <!-- Fuentes e iconos por CDN -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <!-- Design system || usando modulos para gestionar un CSS reutilizable-->
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <header class="app-header" id="app-header"></header>

  <main>
    <div class="page">
      <section class="hero">
        <h1 class="hero__title" id="hero-title">Elegí tu lavado</h1>
        <p class="hero__subtitle">Servicios y accesorios para dejar tu auto impecable.</p>
      </section>

      <div class="segmented">
        <div class="segmented__inner" id="category-tabs"></div>
      </div>

      <div class="product-grid" id="product-grid"></div>
    </div>
  </main>

  <script type="module" src="js/productos.js"></script>
</body>
</html>
